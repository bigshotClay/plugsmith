name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing — no API key needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hatch
        run: pip install hatch

      - name: Inject PAT_TOKEN into source
        run: |
          sed -i "s|os.environ.get(\"PAT_TOKEN\", \"\")|\"$PAT_TOKEN\"|" \
            src/plugsmith/hw_submit.py
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Build distribution
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI trusted publishing (OIDC).
        # In your PyPI project settings, add a trusted publisher for this repo.
