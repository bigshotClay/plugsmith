name: Feature Request
description: Have an idea for something plugsmith should do?
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where this would help you.
      placeholder: |
        Example: When I'm at a hamfest, I want to quickly switch between
        two different config.yaml files without re-running setup.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature as you imagine it.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it regularly
        - Blocking my use of plugsmith
